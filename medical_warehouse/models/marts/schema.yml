version: 2

models:
  - name: dim_channels
    description: "One row per Telegram channel with aggregated posting stats."
    columns:
      - name: channel_key
        description: "Surrogate key for the channel dimension."
        tests:
          - unique
          - not_null
      - name: channel_name
        description: "Channel username, business key."
        tests:
          - unique
          - not_null
      - name: channel_type
        description: "Pharmaceutical, Cosmetics, or Medical classification."
        tests:
          - not_null
      - name: first_post_date
        description: "Earliest scraped message date for this channel."
      - name: last_post_date
        description: "Latest scraped message date for this channel."
      - name: total_posts
        description: "Total number of scraped messages for this channel."
      - name: avg_views
        description: "Average view count across this channel's messages."

  - name: dim_dates
    description: "Date dimension spanning the full range of scraped message dates."
    columns:
      - name: date_key
        description: "Surrogate integer key in YYYYMMDD format."
        tests:
          - unique
          - not_null
      - name: full_date
        description: "Calendar date."
        tests:
          - unique
          - not_null
      - name: day_of_week
      - name: day_name
      - name: week_of_year
      - name: month
      - name: month_name
      - name: quarter
      - name: year
      - name: is_weekend
        description: "True if the date falls on Saturday or Sunday."

  - name: fct_messages
    description: "Fact table, one row per Telegram message, with FKs into dim_channels and dim_dates."
    columns:
      - name: message_id
        description: "Unique Telegram message id."
        tests:
          - not_null
      - name: channel_key
        description: "FK to dim_channels.channel_key."
        tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_key
      - name: date_key
        description: "FK to dim_dates.date_key."
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: message_text
        description: "Cleaned message text."
      - name: message_length
        description: "Character length of message_text."
      - name: view_count
        description: "Number of views on the message."
      - name: forward_count
        description: "Number of forwards of the message."
      - name: has_image
        description: "True if the message included a downloaded image."
  - name: fct_image_detections
    description: "One row per YOLO detection joined to fct_messages for channel/date context."
    columns:
      - name: message_id
        description: "FK to fct_messages.message_id."
        tests:
          - not_null
      - name: channel_key
        description: "FK to dim_channels.channel_key."
        tests:
          - not_null
      - name: date_key
        description: "FK to dim_dates.date_key."
        tests:
          - not_null
      - name: detected_class
        description: "YOLOv8 COCO class name detected (null if nothing above threshold)."
      - name: confidence_score
        description: "Detection confidence score between 0 and 1."
      - name: image_category
        description: "promotional, product_display, lifestyle, or other."